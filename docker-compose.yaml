services:
  openclaw:
    image: ghcr.io/charlotte-lau-hk-work/openclaw:latest
    # build:
    #   context: ./openclaw
    #   dockerfile: Dockerfile
    #   args:
    #     - OPENCLAW_DOCKER_APT_PACKAGES=curl gpg pandoc ffmpeg rclone sqlite3 tesseract-ocr jq tailscale
    container_name: openclaw
    hostname: openclaw
    restart: unless-stopped
    shm_size: '2gb'
    user: "1000:1000"
    command: >
      sh -c "mkdir -p /home/node/.openclaw/tailscale &&
      tailscaled --tun=userspace-networking --socks5-server=localhost:1055 --socket=/home/node/.openclaw/tailscale/tailscaled.sock --state=/home/node/.openclaw/tailscale/tailscaled.state &
      node openclaw.mjs gateway --allow-unconfigured --bind lan"
    ports:
      - "127.0.0.1:18789:18789"
      - "127.0.0.1:8788:8788"
    environment:
      - GEMINI_API_KEYS=${GEMINI_API_KEYS}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/home/node/.openclaw/bin:/opt/tools
      - XDG_CONFIG_HOME=/home/node/.openclaw/.config
    volumes:
      - /home/openclaw/openclaw-data:/home/node/.openclaw
      - /home/openclaw/openclaw-tools:/opt/tools:ro
      - /home/openclaw/openclaw-shared-volume:/home/node/shared
    group_add:
      - "2000"
    networks:
      - ai_network
    env_file:
      - .env

networks:
  ai_network:
    driver: bridge
